<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="referrer" content="no-referrer"><meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=()"><meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'none'; img-src 'self' blob: data:; media-src 'self' blob:; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon.svg" type="image/svg+xml"><link rel="stylesheet" href="styles.css"><script src="security.js" defer></script><title>FileLock Pro</title>
<style>
:root{font-family:system-ui,"Segoe UI",sans-serif;color:#172033;background:#eef2f7}*{box-sizing:border-box}body{margin:0;padding:24px}.app{max-width:980px;margin:auto;background:#fff;border-radius:20px;padding:28px;box-shadow:0 18px 55px #1e293b18}header{display:flex;align-items:center;justify-content:space-between}h1{margin:0;font-size:2rem}.ver{background:#e8efff;color:#245fe7;padding:6px 10px;border-radius:99px;font-weight:700}.sub{color:#667085}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:#f2f4f7;padding:6px;border-radius:14px;margin:22px 0}.tab{border:0;background:transparent;padding:12px;border-radius:10px;font-weight:700;cursor:pointer}.tab.active{background:#fff;color:#245fe7;box-shadow:0 2px 8px #0001}.panel{display:none}.panel.active{display:block}.pick{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:11px;padding:13px 16px;font-weight:700;cursor:pointer}.outline{border:1.5px solid #3169ed;color:#245fe7;background:#fff}.primary{background:#2864e8;color:white;width:100%;margin-top:14px}.danger{background:#feecec;color:#c83232}.list{border:1px solid #dce2ea;border-radius:12px;margin-top:14px;max-height:300px;overflow:auto}.empty{padding:28px;text-align:center;color:#7b8494}.file{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:11px 13px;border-bottom:1px solid #edf0f4}.file:last-child{border:0}.file small{display:block;color:#7a8494;word-break:break-all}.pwgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}.pw{position:relative}.pw input{width:100%;padding:13px 44px 13px 13px;border:1px solid #d7dde7;border-radius:10px;font-size:16px}.eye{position:absolute;right:6px;top:5px;border:0;background:none;padding:8px;cursor:pointer;font-size:18px}.note{font-size:13px;color:#697386;margin-top:8px}.status{margin-top:14px;padding:12px;border-radius:10px;display:none}.status.show{display:block}.status.ok{background:#e9f9ef;color:#087a37}.status.err{background:#fff0f0;color:#c32626}.status.info{background:#eef4ff;color:#2455b8}.progress{height:9px;background:#e7ebf1;border-radius:99px;overflow:hidden;margin-top:12px;display:none}.progress i{display:block;height:100%;width:0;background:#2864e8}.preview{margin-top:16px}.preview video,.preview audio,.preview img{max-width:100%;max-height:65vh}.stats{font-size:13px;color:#596579;margin-top:8px}.actions{display:flex;gap:8px;align-items:center}.cancel{display:none;margin-top:8px}@media(max-width:650px){body{padding:10px}.app{padding:18px}.tabs{grid-template-columns:1fr}.pick,.pwgrid{grid-template-columns:1fr}h1{font-size:1.5rem}}
</style></head><body><main class="app"><header><h1>🔐 FileLock Pro</h1><span class="ver">v2.0.1</span></header><p class="sub">เข้ารหัสไฟล์บนเครื่องของคุณ — ข้อมูลไม่ถูกอัปโหลดไปที่เซิร์ฟเวอร์</p><nav class="tabs"><button class="tab active" data-tab="view">▶ ถอดรหัสและแสดง</button><button class="tab" data-tab="encrypt">🔐 เข้ารหัสทั้งหมด</button><button class="tab" data-tab="download">💾 ถอดรหัสเป็นไฟล์</button></nav><section id="view" class="panel active"></section><section id="encrypt" class="panel"></section><section id="download" class="panel"></section><div class="progress"><i></i></div><button class="btn danger cancel">ยกเลิก</button><div class="status"></div><div class="preview"></div><button class="btn clear-all" type="button">🧹 ล้างข้อมูลทั้งหมดของแอป</button></main>
<script>
(()=>{'use strict';const VERSION=2,MAX=6*1024**3,CHUNK=4*1024**2,MAGIC=new Uint8Array([70,76,80,82]),te=new TextEncoder(),td=new TextDecoder();let files=[],mode='view',abort=false,urls=[];const $=s=>document.querySelector(s),panels=[...document.querySelectorAll('.panel')];
function template(kind){const enc=kind==='encrypt';return `<div class="pick"><button class="btn outline pickfiles">📄 เลือกไฟล์</button><button class="btn outline pickfolder">📁 เลือกโฟลเดอร์</button></div><input class="fin" type="file" multiple hidden><input class="din" type="file" webkitdirectory multiple hidden><div class="list"><div class="empty">ยังไม่ได้เลือกไฟล์</div></div><div class="stats"></div><div class="pwgrid"><label>รหัสผ่าน<div class="pw"><input class="pass" type="password" autocomplete="off"><button class="eye" type="button" aria-label="แสดงรหัสผ่าน">👁</button></div></label>${enc?`<label>ยืนยันรหัสผ่าน<div class="pw"><input class="confirm" type="password" autocomplete="off"><button class="eye" type="button" aria-label="แสดงรหัสผ่าน">👁</button></div></label>`:''}</div><p class="note">รองรับไฟล์ละไม่เกิน 6 GB</p><button class="btn primary run">${enc?'🔐 เข้ารหัสไฟล์ที่เลือก':kind==='view'?'▶ ถอดรหัสไฟล์ที่เลือกและแสดง':'💾 ถอดรหัสไฟล์ที่เลือก'}</button>${kind==='view'?'<div class="navfiles"><button class="btn outline prev">◀ ไฟล์ก่อนหน้า</button><button class="btn outline next">ไฟล์ถัดไป ▶</button></div>':''}`}
panels.forEach(p=>p.innerHTML=template(p.id));document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{mode=b.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));panels.forEach(x=>x.classList.toggle('active',x.id===mode));files=[];render()});
panels.forEach(p=>{p.querySelector('.pickfiles').onclick=()=>p.querySelector('.fin').click();p.querySelector('.pickfolder').onclick=()=>p.querySelector('.din').click();p.querySelectorAll('input[type=file]').forEach(i=>i.onchange=e=>add([...e.target.files]));p.querySelectorAll('.eye').forEach(b=>b.onclick=()=>{const i=b.previousElementSibling;i.type=i.type==='password'?'text':'password';b.textContent=i.type==='password'?'👁':'🙈'});p.querySelector('.run').onclick=run;if(p.id==='view'){p.querySelector('.prev').onclick=()=>moveView(-1);p.querySelector('.next').onclick=()=>moveView(1)}});$('.cancel').onclick=()=>abort=true;window.addEventListener('filelock-clear-all',()=>{abort=true;files=[];urls.forEach(URL.revokeObjectURL);urls=[];panels.forEach(p=>{p.querySelectorAll('input[type=file]').forEach(i=>i.value='');p.querySelectorAll('input.pass,input.confirm').forEach(i=>i.value='')});$('.preview').replaceChildren();render();status('ล้างข้อมูลทั้งหมดที่แอปจัดการแล้ว','ok')});
function add(fs){for(const f of fs)if(f.size<=MAX&&!files.some(x=>x.name===f.name&&x.size===f.size&&x.webkitRelativePath===f.webkitRelativePath))files.push(f);const bad=fs.filter(f=>f.size>MAX);if(bad.length)status(`ข้าม ${bad.length} ไฟล์ที่มีขนาดเกิน 6 GB`,'err');render()}
function render(){const p=$(`#${mode}`),list=p.querySelector('.list');if(mode==='view'&&files.length&&!files.some(f=>f.chosen))files[0].chosen=true;if(mode!=='view')files.forEach(f=>{if(f.chosen===undefined)f.chosen=true});list.innerHTML=files.length?'':`<div class="empty">ยังไม่ได้เลือกไฟล์</div>`;files.forEach((f,i)=>{const row=document.createElement('label');row.className='file';row.innerHTML=`<input type="${mode==='view'?'radio':'checkbox'}" name="selected-view" ${f.chosen?'checked':''}><span><b></b><small></small></span><button type="button" class="btn danger">ลบ</button>`;row.querySelector('b').textContent=f.name;row.querySelector('small').textContent=`${f.webkitRelativePath||'ไฟล์'} • ${size(f.size)}`;row.querySelector('input').onchange=e=>{if(mode==='view')files.forEach((x,j)=>x.chosen=j===i);else f.chosen=e.target.checked;render()};row.querySelector('button').onclick=()=>{files.splice(i,1);render()};list.append(row)});p.querySelector('.stats').textContent=files.length?`${files.length} ไฟล์ • รวม ${size(files.reduce((a,f)=>a+f.size,0))}`:''}
async function moveView(step){if(!files.length)return status('ยังไม่มีไฟล์ในรายการ','err');if(!$('#view .pass').value)return status('กรุณาใส่รหัสผ่าน','err');let i=files.findIndex(f=>f.chosen);i=(i+step+files.length)%files.length;files.forEach((f,j)=>f.chosen=j===i);render();await run()}
function chosen(){return files.filter(f=>f.chosen)}function size(n){const u=['B','KB','MB','GB'];let i=0;while(n>=1024&&i<3)n/=1024,i++;return `${n.toFixed(i?1:0)} ${u[i]}`}
function status(s,c='info'){const e=$('.status');e.textContent=s;e.className=`status show ${c}`}function prog(n){$('.progress').style.display='block';$('.progress i').style.width=`${n}%`}function busy(v){document.querySelectorAll('button').forEach(b=>b.disabled=v);$('.cancel').disabled=false;$('.cancel').style.display=v?'inline-block':'none';if(!v)setTimeout(()=>$('.progress').style.display='none',600)}
async function key(p,s){const m=await crypto.subtle.importKey('raw',te.encode(p),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:100000,hash:'SHA-256'},m,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}function ivAt(base,n){const v=base.slice(),d=new DataView(v.buffer);d.setUint32(8,(d.getUint32(8,false)+n)>>>0,false);return v}function u32(n){const b=new Uint8Array(4);new DataView(b.buffer).setUint32(0,n,true);return b}
async function sink(name,dir){if(dir){const h=await dir.getFileHandle(name,{create:true}),w=await h.createWritable();return{write:x=>w.write(x),close:()=>w.close()}}if(window.showSaveFilePicker){const h=await showSaveFilePicker({suggestedName:name}),w=await h.createWritable();return{write:x=>w.write(x),close:()=>w.close()}}const parts=[];return{write:x=>parts.push(x),close:()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(parts));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),30000)}}}
async function encrypt(f,p,dir){const out=await sink(f.name+'.encrypted',dir),salt=crypto.getRandomValues(new Uint8Array(16)),base=crypto.getRandomValues(new Uint8Array(12)),k=await key(p,salt),nb=te.encode(f.name),pb=te.encode(f.webkitRelativePath||'');await out.write(MAGIC);await out.write(salt);await out.write(base);await out.write(u32(nb.length));await out.write(nb);await out.write(u32(pb.length));await out.write(pb);let n=0;for(let off=0;off<f.size;off+=CHUNK){if(abort)throw Error('ยกเลิกแล้ว');const plain=await f.slice(off,off+CHUNK).arrayBuffer(),enc=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv:ivAt(base,n++)},k,plain));await out.write(u32(enc.length));await out.write(enc);prog(Math.min(99,(off+plain.byteLength)/f.size*100))}await out.close()}
async function decrypt(f,p,toView,dir){const head=new Uint8Array(await f.slice(0,48).arrayBuffer());if(!MAGIC.every((x,i)=>head[i]===x))throw Error('ไม่ใช่ไฟล์ FileLock Pro');let off=4,salt=head.slice(off,off+16);off+=16;const base=head.slice(off,off+12);off+=12;const dv=new DataView(head.buffer),nl=dv.getUint32(off,true);off+=4;let need=off+nl+4;if(head.length<need){}const hb=new Uint8Array(await f.slice(0,Math.min(f.size,need+65536)).arrayBuffer()),hd=new DataView(hb.buffer);const name=td.decode(hb.slice(off,off+nl));off+=nl;const pl=hd.getUint32(off,true);off+=4+pl;const k=await key(p,salt);let out=null,parts=[],tempHandle=null,tempName='';const useTemp=toView&&f.size>64*1024*1024;if(useTemp){if(!navigator.storage?.getDirectory)throw Error('อุปกรณ์นี้ไม่รองรับการแสดงไฟล์ใหญ่ กรุณาใช้แท็บ “ถอดรหัสเป็นไฟล์”');const root=await navigator.storage.getDirectory();tempName=`filelock-preview-${Date.now()}-${crypto.randomUUID?.()||Math.random().toString(36).slice(2)}`;tempHandle=await root.getFileHandle(tempName,{create:true});out=await tempHandle.createWritable();window.fileLockTempNames=window.fileLockTempNames||[];window.fileLockTempNames.push(tempName)}else if(!toView)out=await sink(name,dir);let n=0;try{while(off<f.size){if(abort)throw Error('ยกเลิกแล้ว');const lb=await f.slice(off,off+4).arrayBuffer();if(lb.byteLength<4)throw Error('ไฟล์ไม่สมบูรณ์');const len=new DataView(lb).getUint32(0,true);off+=4;if(len<16||off+len>f.size)throw Error('ไฟล์ไม่สมบูรณ์');const enc=await f.slice(off,off+len).arrayBuffer();off+=len;const dec=new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv:ivAt(base,n++)},k,enc));out?await out.write(dec):parts.push(dec);prog(off/f.size*100)}if(out)await out.close();if(toView)preview(useTemp?await tempHandle.getFile():new Blob(parts),name)}catch(e){try{await out?.abort?.()}catch(_){}throw e}}
function preview(blob,name){urls.forEach(URL.revokeObjectURL);urls=[];const url=URL.createObjectURL(blob);urls.push(url);const ext=name.split('.').pop().toLowerCase(),box=$('.preview');box.innerHTML='';const h=document.createElement('h3');h.textContent=name;box.append(h);let el;if(['mp4','webm','mov','m4v'].includes(ext)){el=document.createElement('video');el.controls=true}else if(['mp3','wav','ogg','m4a'].includes(ext)){el=document.createElement('audio');el.controls=true}else if(['jpg','jpeg','png','gif','webp'].includes(ext))el=document.createElement('img');else{el=document.createElement('a');el.textContent='เปิด/บันทึกไฟล์ที่ถอดรหัส';el.href=url;el.download=name}el.src=url;box.append(el)}
async function run(){const p=$(`#${mode}`),pw=p.querySelector('.pass').value,fs=chosen();if(!fs.length)return status('กรุณา tick เลือกไฟล์อย่างน้อย 1 ไฟล์','err');if(!pw)return status('กรุณาใส่รหัสผ่าน','err');if(mode==='encrypt'&&pw!==p.querySelector('.confirm').value)return status('รหัสผ่านทั้งสองช่องไม่ตรงกัน','err');abort=false;busy(true);try{let dir=null;if(mode!=='view'&&fs.length>1){if(!window.showDirectoryPicker)throw Error('กรุณาใช้ Chrome หรือ Edge เพื่อเลือกโฟลเดอร์ปลายทางครั้งเดียว');dir=await showDirectoryPicker({mode:'readwrite'})}for(let i=0;i<fs.length;i++){status(`กำลังประมวลผล ${i+1}/${fs.length}: ${fs[i].name}`);mode==='encrypt'?await encrypt(fs[i],pw,dir):await decrypt(fs[i],pw,mode==='view',dir)}prog(100);status('ดำเนินการสำเร็จ','ok')}catch(e){status(e.name==='OperationError'?'รหัสผ่านไม่ถูกต้อง หรือไฟล์เสียหาย':e.message,'err')}finally{busy(false)}}
})();
</script></body></html>
